name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" --channel=3 || \
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Grant execute permission (if wrapper present)
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: Upload build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log

      - name: Report log tail as issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import urllib.request

          with open("build-output.log", "r", errors="replace") as f:
              content = f.read()[-50000:]

          payload = json.dumps({
              "title": f"CI build failed - run {os.environ['RUN_ID']}",
              "body": "```\n" + content + "\n```"
          }).encode("utf-8")

          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"token {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as resp:
              print(resp.status)
          PYEOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-file-manager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
